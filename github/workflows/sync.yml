name: Sync Dasheng Data

on:
  schedule:
    - cron: '0,30 0-14 * * *'
  workflow_dispatch:

concurrency:
  group: sync-data
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run sync script
        run: python scripts/sync.py
        env:
          DASHENG_TOKEN: ${{ secrets.DASHENG_TOKEN }}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "sync: update $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git push

      - name: Purge jsDelivr CDN cache
        if: success()
        run: |
          echo "Purging CDN cache..."
          for f in meta.json latest.json part1.json part2.json; do
            curl -sf "https://purge.jsdelivr.net/gh/lly266/dasheng-data@main/data/$f" || true
          done
          echo "CDN cache purged."
